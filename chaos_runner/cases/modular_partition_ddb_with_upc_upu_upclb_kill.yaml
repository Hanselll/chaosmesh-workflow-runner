name: modular_partition_ddb_with_upc_upu_upclb_kill

workflow:
  name: wf-partition-ddb-with-upc-upu-upclb-kill
  namespace: default

renderer: modular_chaos

targets:
  # 一个分片的 master（可改为 1/2...）
  - id: ddb_shard_master
    finder: ddb_shard_master
    shard: "0"

  # 本分片 slave + 其他分片全部 master/slave
  - id: ddb_shard_master_peers
    finder: ddb_shard_master_peers
    shard: "0"

  - id: upc_talker
    finder: upc_talker
  - id: upu_pool
    finder: by_label_prefix
    label_prefix: "app.kubernetes.io/component: dupf-pod-upu-"
  - id: upc_lb_pool
    finder: by_label
    label: "app.kubernetes.io/dupf.service: dupf-pod-upc-lb"

stages:
  - mode: parallel
    faults:
      - type: network_partition
        selectors:
          from: ddb_shard_master
          to: ddb_shard_master_peers
        direction: both
        duration: 60s

      - type: container_kill
        target: upc_talker
        duration: 1s
        delay: "0s~1s"
        containerNames: [upc]

      - type: container_kill
        target: upu_pool
        expand:
          mode: random
          count: 1
        duration: 1s
        delay: "0s~1s"
        containerNames: [upu]

      - type: container_kill
        target: upc_lb_pool
        expand:
          mode: random
          count: 1
        duration: 1s
        delay: "0s~1s"
        containerNames: [upc-lb]

  - mode: parallel
    faults:
      - type: network_partition
        selectors:
          from: ddb_shard_master
          to: ddb_shard_master_peers
        direction: both
        duration: 60s

      - type: pod_kill
        target: upc_talker
        duration: 1s
        delay: "0s~1s"

      - type: pod_kill
        target: upu_pool
        expand:
          mode: random
          count: 1
        duration: 1s
        delay: "0s~1s"

      - type: pod_kill
        target: upc_lb_pool
        expand:
          mode: random
          count: 1
        duration: 1s
        delay: "0s~1s"

wait_seconds: 160
cleanup: true
