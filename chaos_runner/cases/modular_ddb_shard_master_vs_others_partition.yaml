name: modular_ddb_shard_master_vs_others_partition
namespace: default

mode: modular_chaos

# 指定一个分片（如 0 / shd-0），将该分片 master 与“其他所有分片 DDB 实例”做网络分区

targets:
  - id: ddb_shard0_master
    finder: ddb_shard_master
    shard: "0"

  - id: ddb_other_shards
    finder: ddb_other_shard_pods
    shard: "0"

chaos:
  steps:
    - id: partition_shard0_master_from_other_shards
      action:
        type: network_partition
        params:
          from: ddb_shard0_master
          to: ddb_other_shards
          direction: both
          duration: 120s
