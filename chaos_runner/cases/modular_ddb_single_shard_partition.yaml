name: modular_ddb_single_shard_partition

workflow:
  name: wf-modular-ddb-single-shard-partition
  namespace: default

renderer: modular_chaos

targets:
  # 指定分片：可写 0 或 shd-0
  - id: ddb_shard0_master
    finder: ddb_shard_master
    shard: "0"

  - id: ddb_shard0_slaves
    finder: ddb_shard_slaves
    shard: "0"

stages:
  - mode: parallel
    faults:
      - type: network_partition
        selectors:
          from: ddb_shard0_master
          to: ddb_shard0_slaves
        duration: 60s
        direction: both

wait_seconds: 80
cleanup: true
