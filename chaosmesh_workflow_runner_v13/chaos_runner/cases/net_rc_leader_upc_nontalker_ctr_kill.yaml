name: net_rc_leader_upc_nontalker_ctr_kill

workflow:
  name: net-rc-leader-upc-nontalker-ctr-kill
  namespace: default

renderer: network_parallel_containerkill

targets:
  - id: rc_leader
    finder: rc_leader
  - id: upc
    finder: upc_non_talkers
network:
  duration: 30
  actions: [delay, loss]
  delay:
    latency: 300ms
    jitter: 10ms
  loss:
    loss: "10"
    corr: "0"
  direction: both
  selectors:
    from: upc
    to: rc_etcd
  labels:
    to: "app.kubernetes.io/component: dupf-registry-center"
    from: "app.kubernetes.io/component: dupf-pod-upc"

kill: 
  items:
    - target: rc_leader
      delay: "300ms"
      containerNames:
        - registry-center
      #expand:
      #  mode: indices
      #  indices: [1]
      #delay: "200ms"        # 这一条的默认 delay（每个 pod 可覆盖，见下面的 delayMap 可选扩展）
      #containerMap:
      #  dupf-sf-mq-proxy-0:
      #    - mq-proxy-main
      #  dupf-sf-mq-proxy-1:
      #    - mq-proxy-main
      #  dupf-sf-mq-proxy-2:
      #    - mq-proxy-main

    - target: upc
      expand:
        mode: random
        count: 1
      delay: "100ms"
      containerNames:
        - upc

wait_seconds: 10
cleanup: true
