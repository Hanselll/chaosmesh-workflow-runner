name: example_cpu_stress_role
workflow:
  name: wf-example-cpu-stress-role
  namespace: default

renderer: cpu_stress_single_role

targets:
  - id: rc_leader
    finder: rc_leader
  - id: rc_followers
    finder: rc_followers

stress:
  targets:
    - target: rc_leader
    - target: rc_followers
      expand:
        mode: random
        count: 1
  duration: "20s~40s"
  cpu:
    workers: 2
    load: 75

wait_seconds: 60
cleanup: true
