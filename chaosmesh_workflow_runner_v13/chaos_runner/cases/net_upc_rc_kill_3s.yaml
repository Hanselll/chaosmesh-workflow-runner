name: net_upc_rc_kill_3s

workflow:
  name: wf-net-upc-rc-kill-3s
  namespace: default

# 使用“网络 + kill”的 renderer
renderer: network_then_parallel_podkill

targets:
  - id: upc
    finder: upc_talker

  - id: rc
    finder: rc_leader

network:
  duration: 180            # 网络故障持续 3 分钟
  action: delay
  direction: both
  delay:
    latency: 100ms
    jitter: 10ms
  selectors:
    from: upc
    to: rc
  labels:
    from: "app.kubernetes.io/component: dupf-pod-upc"
    to: "app.kubernetes.io/component: dupf-registry-center"  # 这里设置标签
kill:
  items:
    # 网络故障已存在
    - target: upc
      delay: 0

    # 相隔 3 秒 kill RC leader
    - target: rc
      delay: 3

wait_seconds: 200
cleanup: true

