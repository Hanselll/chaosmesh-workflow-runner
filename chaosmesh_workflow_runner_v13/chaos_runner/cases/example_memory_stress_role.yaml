name: example_memory_stress_role
workflow:
  name: wf-example-memory-stress-role
  namespace: default

renderer: memory_stress_single_role

targets:
  - id: sdbm
    finder: sdb_master
  - id: sdbs
    finder: sdb_slaves

stress:
  targets:
    - target: sdbm
    - target: sdbs
      expand:
        mode: random
        count: 1
  duration:
    min: 20s
    max: 60s
  memory:
    workers: 1
    size: 256MB

wait_seconds: 90
cleanup: true
